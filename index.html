<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're Invited — Davy's 60th, Thailand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>

  :root{
    --bg: #0a1e21;
    --bg-deep: #061618;
    --panel: #102c2f;
    --panel-line: rgba(243,238,226,0.10);
    --gold: #cfa53d;
    --coral: #e4694a;
    --text: #f3eee2;
    --text-dim: #9db0ac;
    --text-faint: #6d8480;
    --max: 1080px;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Work Sans', sans-serif;
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  h1,h2,h3{ font-family: 'Fraunces', serif; font-weight: 500; margin: 0; }
  .mono{ font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.03em; }
  .wrap{ max-width: var(--max); margin: 0 auto; padding: 0 28px; }
  ::selection{ background: var(--gold); color: var(--bg-deep); }
  button{ font-family: inherit; }

  #bg-canvas{
    position: fixed;
    inset: 0;
    z-index: 500;
    pointer-events: none;
    mix-blend-mode: screen;
  }

  #fw-canvas{
    position: fixed;
    inset: 0;
    z-index: 998;
    pointer-events: none;
    opacity: 0;
    transition: opacity .4s ease;
    mix-blend-mode: screen;
  }
  #fw-canvas.active{ opacity: 1; }

  #gate, #site{ position: relative; z-index: 1; }

  /* ============ PASSWORD GATE ============ */

  #gate{
    position: fixed;
    inset: 0;
    z-index: 999;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at 50% 20%, #163a3e 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 70%);
    padding: 24px;
  }

  .gate-box{
    max-width: 400px;
    width: 100%;
    text-align: center;
  }

  .gate-box .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 18px;
  }

  .gate-box h1{
    font-size: clamp(26px, 5vw, 34px);
    font-weight: 400;
    margin-bottom: 12px;
  }
  .gate-box h1 em{ color: var(--gold); font-style: italic; }

  .gate-box p.hint{
    font-size: 13.5px;
    color: var(--text-dim);
    font-weight: 300;
    margin-bottom: 30px;
  }

  #gate-input{
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 15px;
    padding: 14px 16px;
    border-radius: 4px;
    outline: none;
    text-align: center;
    letter-spacing: 0.04em;
  }
  #gate-input:focus{ border-color: var(--gold); }

  #gate-submit{
    width: 100%;
    margin-top: 14px;
    background: var(--gold);
    color: var(--bg-deep);
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 14px 16px;
    border-radius: 4px;
    cursor: pointer;
    transition: opacity .15s ease;
  }
  #gate-submit:hover{ opacity: 0.88; }

  #gate-error{
    margin-top: 14px;
    font-size: 12.5px;
    color: var(--coral);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }

  /* ============ SITE (hidden until unlocked) ============ */

  #site{ display:none; }
  #site.unlocked{ display:block; }

  /* ---------- TOP BAR ---------- */

  .topbar{
    position: sticky;
    top: 0;
    z-index: 50;
    display:flex;
    justify-content: flex-end;
    align-items:center;
    gap: 6px;
    padding: 16px 28px;
    background: rgba(6,22,24,0.85);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--panel-line);
  }

  .lang-btn{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    background: none;
    border: 1px solid var(--panel-line);
    color: var(--text-faint);
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .lang-btn.active{ color: var(--gold); border-color: var(--gold); }
  .lang-btn:hover{ color: var(--text); }

  /* ---------- HERO ---------- */

  .hero{
    position: relative;
    min-height: 78vh;
    display:flex;
    flex-direction: column;
    justify-content: center;
    align-items:center;
    text-align:center;
    padding: 60px 28px 100px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 8%, #2a6b6e 0%, transparent 55%),
      linear-gradient(180deg, #0d3438 0%, #0a2528 45%, var(--bg) 100%);
  }

  .hero-haze{
    position:absolute; inset:0;
    background: radial-gradient(circle at 68% 22%, rgba(255,214,140,0.22) 0%, transparent 45%);
    opacity: 0.9;
  }

  .hero-sun{
    position:absolute;
    top: 10%;
    right: 16%;
    width: 110px; height: 110px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #fff3d6, #ffcf6b 45%, var(--gold) 78%);
    box-shadow: 0 0 100px 30px rgba(255,207,107,0.35), 0 0 40px 8px rgba(255,235,180,0.5);
  }

  .hero-tide{
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 180px;
  }

  .eyebrow{
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.24em;
    font-size: 12px;
    color: var(--gold);
    margin-bottom: 22px;
    position: relative;
    z-index: 2;
  }

  .hero h1{
    position: relative;
    z-index: 2;
    font-size: clamp(36px, 7vw, 68px);
    line-height: 1.08;
    max-width: 16ch;
    font-weight: 400;
  }
  .hero h1 em{ font-style: italic; color: var(--gold); }

  .hero .dates{
    position: relative;
    z-index: 2;
    margin-top: 26px;
    font-size: 15px;
    color: var(--text-dim);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 0.06em;
  }
  .hero .dates span{ color: var(--coral); }

  .hero .sub{
    position: relative;
    z-index: 2;
    max-width: 46ch;
    margin: 22px auto 0;
    color: var(--text-dim);
    font-size: 16px;
    font-weight: 300;
  }

  /* ---------- SECTION SHARED ---------- */

  section{ padding: 90px 0; }

  .section-head{ margin-bottom: 48px; max-width: 640px; }
  .section-head .eyebrow{ margin-bottom: 14px; }
  .section-head h2{ font-size: clamp(26px, 4vw, 38px); font-weight: 400; }
  .section-head p{ color: var(--text-dim); margin-top: 16px; font-size: 15.5px; font-weight: 300; max-width: 54ch; }

  /* ---------- VILLAS ---------- */

  .villas{ background: var(--panel); border-top: 1px solid var(--panel-line); border-bottom: 1px solid var(--panel-line); }

  .villa-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--panel-line);
    border: 1px solid var(--panel-line);
  }
  @media(max-width: 900px){ .villa-grid{ grid-template-columns: 1fr; } }

  .villa-card{ background: var(--panel); padding: 34px 28px; display:flex; flex-direction:column; }

  .villa-card .villa-tag{
    display:inline-block;
    font-family:'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--coral);
    border: 1px solid var(--coral);
    padding: 4px 9px;
    border-radius: 3px;
    margin-bottom: 18px;
    align-self: flex-start;
  }

  .villa-card h3{ font-size: 21px; font-weight: 500; margin-bottom: 4px; }
  .villa-card h3 a{
    color: var(--text);
    text-decoration: none;
    background-image: linear-gradient(var(--gold), var(--gold));
    background-repeat: no-repeat;
    background-position: 0 100%;
    background-size: 0% 1px;
    transition: color .15s ease;
  }
  .villa-card h3 a:hover{ color: var(--gold); background-size: 100% 1px; }

  .villa-card .villa-loc{ font-size: 12px; color: var(--text-faint); margin-bottom: 14px; }
  .villa-card p.desc{ font-size: 14px; color: var(--text-dim); font-weight: 300; margin: 0 0 22px; flex-grow: 1; }

  .villa-card .villa-link{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
    text-decoration: none;
    border-bottom: 1px solid var(--panel-line);
    padding-bottom: 2px;
    align-self: flex-start;
    margin-bottom: 20px;
    transition: color .15s ease, border-color .15s ease;
  }
  .villa-card .villa-link:hover{ color: var(--gold); border-color: var(--gold); }

  .vote-row{
    display:flex;
    align-items:center;
    gap: 12px;
    border-top: 1px solid var(--panel-line);
    padding-top: 18px;
  }

  .vote-btn{
    display:flex;
    align-items:center;
    gap: 8px;
    background: var(--bg-deep);
    border: 1px solid var(--panel-line);
    color: var(--text-dim);
    padding: 9px 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 13.5px;
    transition: all .15s ease;
  }
  .vote-btn svg{ width: 15px; height: 15px; stroke: currentColor; fill: none; }
  .vote-btn:hover{ border-color: var(--gold); color: var(--gold); }
  .vote-btn.voted{ background: rgba(207,165,61,0.14); border-color: var(--gold); color: var(--gold); }
  .vote-btn.voted svg{ fill: var(--gold); }

  .vote-count{ font-family:'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-faint); }

  /* ---------- ITINERARY ---------- */

  .day-row{
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 24px;
    padding: 22px 0;
    border-bottom: 1px solid var(--panel-line);
  }
  .day-row:last-child{ border-bottom: none; }

  .day-row .day-tag{ font-family:'IBM Plex Mono', monospace; font-size: 12px; color: var(--text-faint); line-height: 1.5; }
  .day-row .day-tag .d{ display:block; color: var(--text-dim); font-size: 13px; margin-top: 2px; }

  .day-row h4{ font-family:'Fraunces', serif; font-size: 16.5px; font-weight: 500; margin-bottom: 6px; }
  .day-row p{ margin:0; font-size: 14.5px; color: var(--text-dim); font-weight: 300; }

  .day-row.is-birthday{
    background: linear-gradient(90deg, rgba(207,165,61,0.08), transparent);
    border-left: 2px solid var(--gold);
    padding-left: 20px;
    margin-left: -22px;
  }
  .day-row.is-birthday .day-tag{ color: var(--gold); }
  .day-row.is-birthday .day-tag .d{ color: var(--gold); }
  .day-row.is-birthday h4{ color: var(--gold); }

  /* ---------- WEATHER ---------- */

  .weather{ background: var(--panel); border-top: 1px solid var(--panel-line); border-bottom: 1px solid var(--panel-line); }

  .weather-grid{ display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
  @media(max-width: 720px){ .weather-grid{ grid-template-columns: repeat(2, 1fr); } }

  .weather-stat{ display:flex; flex-direction:column; gap: 8px; padding: 24px 22px; background: var(--bg-deep); border: 1px solid var(--panel-line); }
  .w-value{ font-size: 26px; color: var(--gold); font-family:'IBM Plex Mono', monospace; }
  .w-label{ font-size: 13px; color: var(--text-dim); font-weight: 300; line-height: 1.4; }

  /* ---------- PACKING ---------- */

  .packing-grid{ display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--panel-line); border: 1px solid var(--panel-line); }
  @media(max-width: 780px){ .packing-grid{ grid-template-columns: 1fr; } }

  .packing-col{ background: var(--bg); padding: 32px 30px; }
  .packing-col h3{ font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  .packing-col .sub-label{ font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--coral); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 18px; display:block; }

  .packing-col ul{ list-style: none; margin:0; padding:0; }
  .packing-col li{
    font-size: 14.5px;
    color: var(--text-dim);
    font-weight: 300;
    padding: 10px 0;
    border-bottom: 1px solid var(--panel-line);
    display:flex;
    align-items: baseline;
    gap: 10px;
  }
  .packing-col li:last-child{ border-bottom: none; }
  .packing-col li::before{ content: '·'; color: var(--gold); font-size: 20px; line-height: 0; }

  footer{ padding: 50px 0; text-align:center; border-top: 1px solid var(--panel-line); }
  footer p{ font-family:'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--text-faint); }

  @media (prefers-reduced-motion: reduce){ html{ scroll-behavior:auto; } }

</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="fw-canvas"></canvas>

<!-- ============ PASSWORD GATE ============ -->
<div id="gate">
  <div class="gate-box">
    <p class="eyebrow">PRIVATE INVITATION</p>
    <h1>You're invited to <em>Davy's 60th</em></h1>
    <p class="hint">Enter the password to open your invitation.</p>
    <input type="password" id="gate-input" placeholder="Password" autocomplete="off">
    <button id="gate-submit">Unlock</button>
    <div id="gate-error"></div>
  </div>
</div>

<!-- ============ SITE ============ -->
<div id="site">

  <div class="topbar">
    <button class="lang-btn active" id="lang-en" onclick="setLang('en')">EN</button>
    <button class="lang-btn" id="lang-fr" onclick="setLang('fr')">FR</button>
  </div>

  <header class="hero">
    <div class="hero-haze"></div>
    <div class="hero-sun"></div>
    <svg class="hero-tide" viewBox="0 0 1440 180" preserveAspectRatio="none">
      <path fill="#1c5f63" fill-opacity="0.85" d="M0,90 C240,140 480,50 720,80 C960,110 1200,50 1440,90 L1440,180 L0,180 Z"></path>
      <path fill="#0a1e21" d="M0,120 C260,80 500,150 740,120 C980,90 1220,150 1440,120 L1440,180 L0,180 Z"></path>
    </svg>
    <p class="eyebrow" data-i18n="hero.eyebrow"></p>
    <h1 data-i18n-html="hero.title"></h1>
    <p class="dates mono" data-i18n-html="hero.dates"></p>
    <p class="sub" data-i18n="hero.sub"></p>
  </header>

  <section class="villas">
    <div class="wrap">
      <div class="section-head">
        <p class="eyebrow" data-i18n="villas.eyebrow"></p>
        <h2 data-i18n="villas.title"></h2>
        <p data-i18n="villas.sub"></p>
      </div>

      <div class="villa-grid">

        <div class="villa-card">
          <span class="villa-tag" data-i18n="villas.aruna.tag"></span>
          <h3><a href="https://bookings.mrpropertysiam.com/listings/258003?start=2028-02-02&end=2028-02-11&numberOfGuests=10" target="_blank" rel="noopener">Villa Aruna ↗</a></h3>
          <div class="villa-loc" data-i18n="villas.aruna.loc"></div>
          <p class="desc" data-i18n="villas.aruna.desc"></p>
          <div class="vote-row">
            <button class="vote-btn" data-villa="villa-aruna" onclick="toggleVote(this)">
              <svg viewBox="0 0 24 24" stroke-width="2"><path d="M7 10v11M14 21H5.6a2 2 0 0 1-2-2.3l1.3-8A2 2 0 0 1 6.9 9H10V4a2 2 0 0 1 2-2c1.1 0 2 1.5 2 3v3h4.1a2 2 0 0 1 1.98 2.3l-1.2 7a2 2 0 0 1-2 1.7H14Z"/></svg>
              <span data-i18n="villas.vote"></span>
            </button>
            <span class="vote-count mono" data-count="villa-aruna">–</span>
          </div>
        </div>

        <div class="villa-card">
          <span class="villa-tag" data-i18n="villas.hin.tag"></span>
          <h3><a href="https://www.theluxurysignature.com/property/villa-hin-koh-samui/" target="_blank" rel="noopener">Villa Hin Samui ↗</a></h3>
          <div class="villa-loc" data-i18n="villas.hin.loc"></div>
          <p class="desc" data-i18n="villas.hin.desc"></p>
          <div class="vote-row">
            <button class="vote-btn" data-villa="villa-hin" onclick="toggleVote(this)">
              <svg viewBox="0 0 24 24" stroke-width="2"><path d="M7 10v11M14 21H5.6a2 2 0 0 1-2-2.3l1.3-8A2 2 0 0 1 6.9 9H10V4a2 2 0 0 1 2-2c1.1 0 2 1.5 2 3v3h4.1a2 2 0 0 1 1.98 2.3l-1.2 7a2 2 0 0 1-2 1.7H14Z"/></svg>
              <span data-i18n="villas.vote"></span>
            </button>
            <span class="vote-count mono" data-count="villa-hin">–</span>
          </div>
        </div>

        <div class="villa-card">
          <span class="villa-tag" data-i18n="villas.laplaya.tag"></span>
          <h3><a href="https://bookings.mrpropertysiam.com/listings/260406?start=2028-02-02&end=2028-02-11&numberOfGuests=8" target="_blank" rel="noopener">Villa La Playa ↗</a></h3>
          <div class="villa-loc" data-i18n="villas.laplaya.loc"></div>
          <p class="desc" data-i18n="villas.laplaya.desc"></p>
          <div class="vote-row">
            <button class="vote-btn" data-villa="villa-laplaya" onclick="toggleVote(this)">
              <svg viewBox="0 0 24 24" stroke-width="2"><path d="M7 10v11M14 21H5.6a2 2 0 0 1-2-2.3l1.3-8A2 2 0 0 1 6.9 9H10V4a2 2 0 0 1 2-2c1.1 0 2 1.5 2 3v3h4.1a2 2 0 0 1 1.98 2.3l-1.2 7a2 2 0 0 1-2 1.7H14Z"/></svg>
              <span data-i18n="villas.vote"></span>
            </button>
            <span class="vote-count mono" data-count="villa-laplaya">–</span>
          </div>
        </div>

      </div>
      <p class="mono" style="margin-top:20px; font-size:11.5px; color:var(--text-faint);" data-i18n="villas.footnote"></p>
    </div>
  </section>

  <section class="itinerary">
    <div class="wrap">
      <div class="section-head">
        <p class="eyebrow" data-i18n="itin.eyebrow"></p>
        <h2 data-i18n="itin.title"></h2>
        <p data-i18n="itin.sub"></p>
      </div>

      <div id="itin-days"></div>
    </div>
  </section>

  <section class="weather">
    <div class="wrap">
      <div class="section-head">
        <p class="eyebrow" data-i18n="weather.eyebrow"></p>
        <h2 data-i18n="weather.title"></h2>
        <p data-i18n="weather.sub"></p>
      </div>

      <div class="weather-grid">
        <div class="weather-stat"><span class="w-value">29°C</span><span class="w-label" data-i18n="weather.high"></span></div>
        <div class="weather-stat"><span class="w-value">25°C</span><span class="w-label" data-i18n="weather.low"></span></div>
        <div class="weather-stat"><span class="w-value">28°C</span><span class="w-label" data-i18n="weather.sea"></span></div>
        <div class="weather-stat"><span class="w-value">~5</span><span class="w-label" data-i18n="weather.rain"></span></div>
        <div class="weather-stat"><span class="w-value">9h</span><span class="w-label" data-i18n="weather.sun"></span></div>
        <div class="weather-stat" data-i18n="weather.uv"><span class="w-value" data-i18n="weather.uvval"></span><span class="w-label" data-i18n="weather.uvlabel"></span></div>
      </div>
      <p style="margin-top:28px; font-size:14px; color:var(--text-dim); font-weight:300; max-width:60ch;" data-i18n="weather.note"></p>
    </div>
  </section>

  <section class="packing">
    <div class="wrap">
      <div class="section-head">
        <p class="eyebrow" data-i18n="packing.eyebrow"></p>
        <h2 data-i18n="packing.title"></h2>
        <p data-i18n="packing.sub"></p>
      </div>

      <div class="packing-grid">
        <div class="packing-col">
          <span class="sub-label" data-i18n="packing.everyone.label"></span>
          <h3 data-i18n="packing.everyone.title"></h3>
          <ul id="packing-everyone"></ul>
        </div>
        <div class="packing-col">
          <span class="sub-label" data-i18n="packing.babies.label"></span>
          <h3 data-i18n="packing.babies.title"></h3>
          <ul id="packing-babies"></ul>
        </div>
      </div>
    </div>
  </section>

  <footer>
    <p data-i18n="footer.text"></p>
  </footer>

</div>

<script>

  /* ---------------- REDUCED MOTION CHECK ---------------- */
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------------- AMBIENT DRIFTING BACKGROUND ---------------- */

  (function ambientBackground(){
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, particles;

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const colors = ['#cfa53d', '#e4694a', '#f3eee2'];

    function makeParticle(){
      return {
        x: Math.random() * w,
        y: h + Math.random() * 100,
        r: 0.6 + Math.random() * 1.8,
        speed: 0.15 + Math.random() * 0.35,
        drift: (Math.random() - 0.5) * 0.3,
        alpha: 0.15 + Math.random() * 0.35,
        color: colors[Math.floor(Math.random() * colors.length)],
        twinkle: Math.random() * Math.PI * 2
      };
    }

    particles = Array.from({length: 46}, makeParticle);

    if(reduceMotion){
      // draw a single static frame, no animation loop
      particles.forEach(p => {
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.arc(p.x, h * 0.5, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      return;
    }

    function tick(){
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => {
        p.y -= p.speed;
        p.x += p.drift;
        p.twinkle += 0.03;
        if(p.y < -10){ Object.assign(p, makeParticle(), {y: h + 10}); }
        const flicker = 0.6 + Math.sin(p.twinkle) * 0.4;
        ctx.beginPath();
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha * flicker;
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(tick);
    }
    tick();
  })();

  /* ---------------- FIREWORKS BURST ---------------- */

  function launchFireworks(onDone){
    const canvas = document.getElementById('fw-canvas');
    if(reduceMotion){ onDone(); return; }

    const ctx = canvas.getContext('2d');
    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;
    canvas.classList.add('active');

    const palette = ['#cfa53d', '#e4694a', '#f3eee2', '#e8a13c'];
    let particles = [];

    function burst(x, y){
      const count = 46;
      const color = palette[Math.floor(Math.random() * palette.length)];
      for(let i = 0; i < count; i++){
        const angle = (Math.PI * 2 * i) / count;
        const speed = 2 + Math.random() * 3.5;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          decay: 0.012 + Math.random() * 0.012,
          color,
          r: 1.5 + Math.random() * 1.5
        });
      }
    }

    // stagger several bursts across the sky
    const burstPoints = [
      [0.5, 0.35], [0.25, 0.45], [0.75, 0.4], [0.4, 0.25], [0.6, 0.5]
    ];
    burstPoints.forEach((pt, i) => {
      setTimeout(() => burst(w * pt[0], h * pt[1]), i * 320);
    });

    let frame = 0;
    const maxFrames = 220;

    function tick(){
      frame++;
      ctx.clearRect(0, 0, w, h);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.045; // gravity
        p.life -= p.decay;
        if(p.life > 0){
          ctx.beginPath();
          ctx.fillStyle = p.color;
          ctx.globalAlpha = Math.max(p.life, 0);
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fill();
        }
      });
      ctx.globalAlpha = 1;
      particles = particles.filter(p => p.life > 0);

      if(frame < maxFrames){
        requestAnimationFrame(tick);
      } else {
        canvas.classList.remove('active');
        setTimeout(() => { ctx.clearRect(0,0,w,h); }, 400);
        onDone();
      }
    }
    tick();
  }

  const NS = 'davys60th-samui-2028-v1';
  const villaKeys = ['villa-aruna','villa-hin','villa-laplaya'];

  async function loadCounts(){
    for(const key of villaKeys){
      const el = document.querySelector(`[data-count="${key}"]`);
      try{
        const res = await fetch(`https://api.countapi.xyz/get/${NS}/${key}`);
        const data = await res.json();
        el.textContent = (data.value || 0) + (data.value === 1 ? ' vote' : ' votes');
      } catch(e){
        el.textContent = '– votes';
      }
    }
  }

  async function toggleVote(btn){
    const key = btn.getAttribute('data-villa');
    const el = document.querySelector(`[data-count="${key}"]`);
    const votedFlag = 'voted_' + key;
    const alreadyVoted = localStorage.getItem(votedFlag) === '1';

    btn.disabled = true;
    try{
      if(!alreadyVoted){
        const res = await fetch(`https://api.countapi.xyz/hit/${NS}/${key}`);
        const data = await res.json();
        el.textContent = data.value + (data.value === 1 ? ' vote' : ' votes');
        localStorage.setItem(votedFlag, '1');
        btn.classList.add('voted');
      } else {
        const res = await fetch(`https://api.countapi.xyz/update/${NS}/${key}?amount=-1`);
        const data = await res.json();
        el.textContent = Math.max(0,data.value) + (data.value === 1 ? ' vote' : ' votes');
        localStorage.removeItem(votedFlag);
        btn.classList.remove('voted');
      }
    } catch(e){
      // offline fallback: just toggle the visual state
      btn.classList.toggle('voted');
      if(!alreadyVoted) localStorage.setItem(votedFlag,'1'); else localStorage.removeItem(votedFlag);
    }
    btn.disabled = false;
  }

  // restore voted state visually on load
  villaKeys.forEach(key => {
    if(localStorage.getItem('voted_' + key) === '1'){
      const btn = document.querySelector(`[data-villa="${key}"]`);
      if(btn) btn.classList.add('voted');
    }
  });
